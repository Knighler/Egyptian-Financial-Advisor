version: '3.8'

volumes:
  postgres-data:

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra"]
      interval: 5s
      timeout: 5s
      retries: 5

  kestra:
    image: kestra/kestra:latest
    command: server local
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ENV_GCP_CREDS: ${GCP_CREDS}
      KESTRA_CONFIGURATION: |
        kestra:
          datastore:
            type: local
            local:
              base-path: /app/storage
          repository:
            type: postgres
            postgres:
              host: postgres
              port: 5432
              username: kestra
              password: kestra_password
              database: kestra
      
    volumes:
      - ./scripts:/app/scripts
      - ./config:/app/config
      - ./gcp-key.json:/app/gcp-key.json:ro
      - /var/run/docker.sock:/var/run/docker.sock 