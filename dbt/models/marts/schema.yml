version: 2

models:
  - name: fct_daily_asset_performance
    description: "The core daily fact table combining stock performance with macro Gold and USD indicators."
    columns:
      - name: stock_daily_id
        tests:
          - unique
          - not_null

  - name: dim_ticker_performance
    description: "Current-day snapshot of moving averages, returns, and volatility for the AI Agent to quickly query."
    
  - name: fct_historical_stats
    description: "Long-term aggregations providing historical context (ATH, ATL, historical volatility) for the AI."